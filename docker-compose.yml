name: reddit-clone

# Reusable env anchors so every service shares infra connection settings.
x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: ${POSTGRES_HOST}
  POSTGRES_PORT: ${POSTGRES_PORT}

x-broker-env: &broker-env
  RABBITMQ_URL: ${RABBITMQ_URL}
  RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
  REDIS_HOST: ${REDIS_HOST}
  REDIS_PORT: ${REDIS_PORT}

x-jwt-env: &jwt-env
  JWT_SECRET: ${JWT_SECRET}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
  REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}

services:
  # ───────────────────────── Infrastructure ─────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [reddit-net]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [reddit-net]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [reddit-net]

  # ───────────────────────── API Gateway ─────────────────────────
  api-gateway:
    build: ./api-gateway
    environment:
      <<: *jwt-env
      GATEWAY_PORT: ${GATEWAY_PORT}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}
      CORS_ORIGIN: ${CORS_ORIGIN}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      AUTH_SERVICE_URL: http://auth-service:${AUTH_SERVICE_PORT}
      USER_SERVICE_URL: http://user-service:${USER_SERVICE_PORT}
      COMMUNITY_SERVICE_URL: http://community-service:${COMMUNITY_SERVICE_PORT}
      POST_SERVICE_URL: http://post-service:${POST_SERVICE_PORT}
      COMMENT_SERVICE_URL: http://comment-service:${COMMENT_SERVICE_PORT}
      VOTE_SERVICE_URL: http://vote-service:${VOTE_SERVICE_PORT}
      FEED_SERVICE_URL: http://feed-service:${FEED_SERVICE_PORT}
      NOTIFICATION_SERVICE_URL: http://notification-service:${NOTIFICATION_SERVICE_PORT}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      redis:
        condition: service_healthy
    networks: [reddit-net]

  # ───────────────────────── Microservices ─────────────────────────
  auth-service:
    build: ./auth-service
    environment:
      <<: [*postgres-env, *broker-env, *jwt-env]
      SERVICE_NAME: auth-service
      PORT: ${AUTH_SERVICE_PORT}
      POSTGRES_DB: auth_db
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [reddit-net]

  user-service:
    build: ./user-service
    environment:
      <<: [*postgres-env, *broker-env, *jwt-env]
      SERVICE_NAME: user-service
      PORT: ${USER_SERVICE_PORT}
      POSTGRES_DB: user_db
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [reddit-net]

  community-service:
    build: ./community-service
    environment:
      <<: [*postgres-env, *broker-env, *jwt-env]
      SERVICE_NAME: community-service
      PORT: ${COMMUNITY_SERVICE_PORT}
      POSTGRES_DB: community_db
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [reddit-net]

  post-service:
    build: ./post-service
    environment:
      <<: [*postgres-env, *broker-env, *jwt-env]
      SERVICE_NAME: post-service
      PORT: ${POST_SERVICE_PORT}
      POSTGRES_DB: post_db
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [reddit-net]

  comment-service:
    build: ./comment-service
    environment:
      <<: [*postgres-env, *broker-env, *jwt-env]
      SERVICE_NAME: comment-service
      PORT: ${COMMENT_SERVICE_PORT}
      POSTGRES_DB: comment_db
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [reddit-net]

  vote-service:
    build: ./vote-service
    environment:
      <<: [*postgres-env, *broker-env, *jwt-env]
      SERVICE_NAME: vote-service
      PORT: ${VOTE_SERVICE_PORT}
      POSTGRES_DB: vote_db
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [reddit-net]

  feed-service:
    build: ./feed-service
    environment:
      <<: [*broker-env, *jwt-env]
      SERVICE_NAME: feed-service
      PORT: ${FEED_SERVICE_PORT}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [reddit-net]

  notification-service:
    build: ./notification-service
    environment:
      <<: [*postgres-env, *broker-env, *jwt-env]
      SERVICE_NAME: notification-service
      PORT: ${NOTIFICATION_SERVICE_PORT}
      POSTGRES_DB: notification_db
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [reddit-net]

volumes:
  pgdata:

networks:
  reddit-net:
    driver: bridge
